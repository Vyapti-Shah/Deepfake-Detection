<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Deepfake Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Background Gradient */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 70% 60%, rgba(0, 255, 200, 0.25), transparent 40%),
                radial-gradient(circle at 30% 30%, rgba(0, 150, 255, 0.25), transparent 40%),
                linear-gradient(135deg, #0b1c3d, #06142b);
            color: white;
        }

        /* Glass Card */
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 26px;
        }

        p {
            font-size: 14px;
            color: #ccc;
        }

        /* Upload Box */
        input[type="file"] {
            margin: 20px 0;
            color: white;
        }

        /* Button */
        button {
            background: linear-gradient(135deg, #00ffc8, #007bff);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Result Box */
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .real {
            color: #00ff99;
        }

        .fake {
            color: #ff4d4d;
        }

        /* Loader */
        .loader {
            display: none;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Deepfake Detection 🚨</h1>
        <p>Upload an image to check if it's Real or Fake</p>

        <form id="uploadForm">
            <input type="file" id="fileInput" required>
            <br>
            <button type="submit">Analyze</button>
        </form>

        <div class="loader" id="loader">⏳ Processing...</div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const form = document.getElementById("uploadForm");
        const resultDiv = document.getElementById("result");
        const loader = document.getElementById("loader");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);

            loader.style.display = "block";
            resultDiv.innerHTML = "";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                loader.style.display = "none";

                if (data.result.includes("Fake")) {
                    resultDiv.innerHTML = `<span class="fake">${data.result}</span>`;
                } else {
                    resultDiv.innerHTML = `<span class="real">${data.result}</span>`;
                }

            } catch (error) {
                loader.style.display = "none";
                resultDiv.innerHTML = "Error occurred!";
            }
        });
    </script>

</body>

</html>
